stages:
  - pre_deploy
  - deploy

build_compoments:
  image: node:12
  stage: pre_deploy
  cache:
    paths:
      - node_modules/
  script:
    - wget --directory-prefix=/root https://git.reso.ru/free/self-signed-sertificate/raw/master/reso.crt
    - export NODE_EXTRA_CA_CERTS=/root/reso.crt
    - npm install
    - cd components-vue2
    - npm install
    - npm run component || true
    - npm run component
  artifacts:
    paths:
      - static/js
    untracked: false
    expire_in: 1 days
  tags:
    - git-docker

deploy_staging:
  image: debian
  stage: deploy
  cache: {}
  script:
    - ls static/
    - "which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )"
    - "which rsync || ( apt-get update -y && apt-get install rsync -y )"
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - chmod 600 $PRIVATE_KEY
    - ssh-add $PRIVATE_KEY
    - ssh-keyscan -H -p $TEST_PORT $TEST_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - rsync --recursive --delete-after --rsh "ssh -p $TEST_PORT" . nodejs@$TEST_HOST:nuxt-vue
    - ssh -p $TEST_PORT nodejs@$TEST_HOST -- '\. ~/.nvm/nvm.sh; cd ~/nuxt-vue; npm install'
    - ssh -p $TEST_PORT nodejs@$TEST_HOST -- '\. ~/.nvm/nvm.sh; cd ~/nuxt-vue/components-vue2; npm install'
    - ssh -p $TEST_PORT nodejs@$TEST_HOST -- '\. ~/.nvm/nvm.sh; cd ~/nuxt-vue/components-vue2; npm run component'
    - ssh -p $TEST_PORT nodejs@$TEST_HOST -- '\. ~/.nvm/nvm.sh; cd ~/nuxt-vue; npm run build'
    - ssh -p $TEST_PORT nodejs@$TEST_HOST -- '\. ~/.nvm/nvm.sh; pm2 restart all'
  environment:
    name: test
    url: http://nodejs.reso.ru/
  dependencies:
    - build_compoments
  only:
    - master
  tags:
    - git-docker
