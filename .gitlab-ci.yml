stages:
  - test
  - deploy

default:
  cache: &default_cache
    key:
      files:
        - package.json
    paths:
      - node_modules/
    policy: pull

test:
  image: node:12
  stage: test
  retry: 1
  script:
    # - npm test
    - echo 'no test yet'
  tags:
    - git-docker

deploy_staging:
  image: debian
  stage: deploy
  cache: {}
  script:
    - 'which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )'
    - 'which rsync || ( apt-get update -y && apt-get install rsync -y )'
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - chmod 600 $PRIVATE_KEY
    - ssh-add $PRIVATE_KEY
    - ssh-keyscan -H -p $TEST_PORT $TEST_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - rsync --recursive --delete-after --rsh "ssh -p $TEST_PORT" . nodejs@$TEST_HOST:test
    - ssh -p $TEST_PORT nodejs@$TEST_HOST -- 'cd ~/test; ~/.nvm/versions/node/v12.14.0/bin/node ~/.nvm/versions/node/v12.14.0/bin/npm install'
    - ssh -p $TEST_PORT nodejs@$TEST_HOST -- 'cd ~/test; ~/.nvm/versions/node/v12.14.0/bin/node ~/.nvm/versions/node/v12.14.0/bin/npm run build'
    - ssh -p $TEST_PORT nodejs@$TEST_HOST -- '~/.nvm/versions/node/v12.14.0/bin/node ~/.nvm/versions/node/v12.14.0/bin/pm2 restart all'
  environment:
    name: test
    url: http://nodejs.reso.ru/
  tags:
    - git-docker
