<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <style>
      .login-form {
        width: 340px;
        margin: 50px auto;
        font-size: 15px;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .btn-block {
        display: block;
        width: 100%;
      }
    </style>
    <script>
      async function auth(form) {
        const formData = new FormData(form);
        const username = formData.get("username");
        const password = formData.get("password");
        const res = await fetch("/am/auth/v2/authorize", {
          headers: {
            accept: "application/json, text/plain, */*",
            "content-type": "application/json",
          },
          body: JSON.stringify({
            mode: 2,
            password,
            username,
          }),
          method: "POST",
        });
        if (res.status === 401) {
          alert("Ошибка авторизации");
          return;
        }
        const data = await res.json();
        document.cookie = `auth.strategy=local; path=/;`;
        document.cookie = `auth._token.local=Bearer%20${data.ACCESS_TOKEN}; path=/;`;
        document.cookie = `auth._refresh_token.local=${data.REFRESH_TOKEN}; path=/;`;

        const url = new URL(window.location.href);
        window.location.href =
          url.searchParams.get("ref") || "/cabinet/55/0/701";
      }
    </script>
  </head>
  <body>
    <form onsubmit="auth(this);return false;" class="login-form">
      <h2 class="text-center">Log in</h2>
      <div class="form-group">
        <input class="form-control" type="tel" name="username" />
      </div>
      <div class="form-group">
        <input class="form-control" type="password" name="password" />
      </div>
      <div class="form-group">
        <button class="btn btn-primary btn-block" type="submit">Log in</button>
      </div>
    </form>
  </body>
</html>
