    <script>


document.addEventListener('DOMContentLoaded', function(){
      let AuthFormBlock = document.querySelectorAll('.block-block > div ');
      AuthFormBlock.forEach(function(element,i){
        let localStorageId =  localStorage.getItem(element.id);
        if (localStorageId === "true"){
          element.classList.add("show");
        }
        let clickButton = document.createElement("button");
        clickButton.setAttribute('type','button');
        clickButton.textContent = element.dataset.namebutton;
        if (localStorageId === "true"){
          clickButton.classList.add("btn-primary");

        }
        else {
          clickButton.classList.add("btn-secondary");
        }


        clickButton.addEventListener('click', function (){
          if (element.className === "show") {
            element.classList.remove("show");
              localStorage.removeItem(element.id);
              clickButton.classList.remove("btn-primary");
              clickButton.classList.add("btn-secondary")
              console.log("bbb");
          }
          else {
            element.classList.add("show");
            localStorage.setItem(element.id,"true");
            clickButton.classList.remove("btn-secondary");
            clickButton.classList.add("btn-primary");
            console.log("aaa");
          }

          
        });
      document.querySelector(".button-block").appendChild(clickButton);
      });
});


    </script>
